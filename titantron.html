<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1">
<title>SHE Tron</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}
#frame{
  position:fixed;
  inset:0;
  background:#000;
}
#stage{
  position:absolute;
  inset:0;
  display:none;
  background:#000;
  overflow:hidden;
}
#playerWrap{
  position:absolute;
  inset:0;
  overflow:hidden;
  background:#000;
}
#playerWrap iframe{
  position:absolute !important;
  top:0 !important;
  left:0 !important;
  width:100% !important;
  height:100% !important;
  border:0;
  display:block;
}
#idle{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}
#idle img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
}
</style>
</head>

<body>
<div id="frame">
  <div id="stage">
    <div id="playerWrap">
      <iframe id="player" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>
  </div>
  <div id="idle"><img id="idleImg" alt="SHE Idle"></div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const v = (qs.get("v") || "").trim();
const isIdle = qs.has("idle");

function baseDir(){
  return location.origin + location.pathname.replace(/[^\/]*$/, "");
}

function extractId(input){
  if(!input) return "";
  let s = input.trim();
  let m = s.match(/[?&]v=([^&]+)/);
  if(m) return m[1];
  m = s.match(/youtu\.be\/([^?&]+)/);
  if(m) return m[1];
  m = s.match(/youtube\.com\/embed\/([^?&]+)/);
  if(m) return m[1];
  return s;
}

const idleImg = document.getElementById("idleImg");
idleImg.src = baseDir() + "idle.png?cb=" + Date.now();

const stage = document.getElementById("stage");
const idle  = document.getElementById("idle");
const player = document.getElementById("player");

function showIdle(){
  player.src = "about:blank";
  stage.style.display = "none";
  idle.style.display = "flex";
}

function buildEmbed(id){
  const origin = location.origin;
  return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(id) +
    "?autoplay=1" +
    "&mute=0" +
    "&controls=0" +
    "&rel=0" +
    "&playsinline=1" +
    "&iv_load_policy=3" +
    "&modestbranding=1" +
    "&loop=1" +
    "&playlist=" + encodeURIComponent(id) +
    "&vq=hd1080" +
    "&enablejsapi=0" +
    "&origin=" + encodeURIComponent(origin);
}

function showVideo(id){
  idle.style.display = "none";
  stage.style.display = "block";
  player.src = buildEmbed(id);
}

if(isIdle || !v) showIdle();
else showVideo(extractId(v));
</script>
</body>
</html>
